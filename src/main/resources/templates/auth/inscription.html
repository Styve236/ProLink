<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Créer un compte - ProLink</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link th:href="@{/img/favicon.ico}" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container-xxl bg-white p-0">

    <nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0">
        <a th:href="@{/}" class="navbar-brand d-flex align-items-center text-center py-0 px-4 px-lg-5">
            <h1 class="m-0 text-primary">ProLink</h1>
        </a>
        <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto p-4 p-lg-0">
                <a th:href="@{/}" class="nav-item nav-link">Accueil</a>
                <a th:href="@{/a-propos}" class="nav-item nav-link">À propos</a>
                <a th:href="@{/offres}" class="nav-item nav-link">Offres</a>
                <a th:href="@{/contact}" class="nav-item nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container-xxl py-5 bg-dark page-header mb-5">
        <div class="container my-5 pt-5 pb-4">
            <h1 class="display-3 text-white mb-3 animated slideInDown">Créer un compte</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb text-uppercase">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-white">Accueil</a></li>
                    <li class="breadcrumb-item text-white active" aria-current="page">Inscription</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                <div class="bg-light rounded p-5 wow fadeInUp" data-wow-delay="0.1s">
                    <h3 class="mb-4 text-center">Rejoignez ProLink</h3>

                    <div class="alert alert-danger" th:if="${erreur}" th:text="${erreur}"></div>

                    <form th:action="@{/auth/inscription}" th:object="${inscriptionDto}" method="post" novalidate>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="prenom" class="form-label">Prénom</label>
                                <input type="text" id="prenom" th:field="*{prenom}" class="form-control py-3">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="nom" class="form-label">Nom</label>
                                <input type="text" id="nom" th:field="*{nom}" class="form-control py-3">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Adresse email</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control py-3">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="password" class="form-label">Mot de passe</label>
                                <input type="password" id="password" th:field="*{password}" class="form-control py-3">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control py-3">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="telephone" class="form-label">Téléphone</label>
                                <input type="text" id="telephone" th:field="*{telephone}" class="form-control py-3">
                            </div>
                            <div class="col-md-6">
                                <label for="ville" class="form-label">Ville</label>
                                <input type="text" id="ville" th:field="*{ville}" class="form-control py-3">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="roleSelect" class="form-label">Je suis...</label>
                            <select th:field="*{role}" id="roleSelect" class="form-select py-3" onchange="afficherChampsRole()">
                                <option value="">-- Choisissez votre profil --</option>
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ROLE</option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                        </div>

                        <div id="champsEtudiant" class="role-fields mb-3" style="display:none;">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="universite" class="form-label">Université</label>
                                    <input type="text" id="universite" th:field="*{universite}" class="form-control py-3">
                                </div>
                                <div class="col-md-6">
                                    <label for="filiere" class="form-label">Filière</label>
                                    <input type="text" id="filiere" th:field="*{filiere}" class="form-control py-3">
                                </div>
                                <div class="col-12">
                                    <label for="niveauEtude" class="form-label">Niveau d'étude</label>
                                    <input type="text" id="niveauEtude" th:field="*{niveauEtude}" class="form-control py-3" placeholder="Ex: Licence 3, Master 1...">
                                </div>
                            </div>
                        </div>

                        <div id="champsFreelance" class="role-fields mb-3" style="display:none;">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="specialite" class="form-label">Spécialité</label>
                                    <input type="text" id="specialite" th:field="*{specialite}" class="form-control py-3" placeholder="Ex: Développement web">
                                </div>
                                <div class="col-md-6">
                                    <label for="tjm" class="form-label">TJM (taux journalier)</label>
                                    <input type="text" id="tjm" th:field="*{tjm}" class="form-control py-3">
                                </div>
                            </div>
                        </div>

                        <div id="champsRecruteur" class="role-fields mb-3" style="display:none;">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="nomEntreprise" class="form-label">Nom de l'entreprise</label>
                                    <input type="text" id="nomEntreprise" th:field="*{nomEntreprise}" class="form-control py-3">
                                </div>
                                <div class="col-md-6">
                                    <label for="secteurActivite" class="form-label">Secteur d'activité</label>
                                    <input type="text" id="secteurActivite" th:field="*{secteurActivite}" class="form-control py-3">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 mt-2">Créer mon compte</button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        Déjà inscrit ?
                        <a th:href="@{/auth/connexion}" class="text-primary">Se connecter</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid bg-dark text-white-50 footer pt-5 mt-5">
        <div class="container py-5 text-center">
            &copy; <a class="border-bottom text-white-50" th:href="@{/}">ProLink</a>, Tous droits réservés.
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>

<script>
    function afficherChampsRole() {
        document.querySelectorAll('.role-fields').forEach(function (el) {
            el.style.display = 'none';
        });

        var role = document.getElementById('roleSelect').value;
        if (role === 'ETUDIANT') {
            document.getElementById('champsEtudiant').style.display = 'block';
        } else if (role === 'FREELANCE') {
            document.getElementById('champsFreelance').style.display = 'block';
        } else if (role === 'RECRUTEUR') {
            document.getElementById('champsRecruteur').style.display = 'block';
        }
    }

    document.addEventListener('DOMContentLoaded', afficherChampsRole);
</script>

</body>
</html>
