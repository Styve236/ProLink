<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <title>Mes documents - ProLink</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link th:href="@{/img/favicon.ico}" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/lib/animate/animate.min.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container-xxl bg-white p-0">
    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Chargement...</span>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0">
        <a th:href="@{/}" class="navbar-brand d-flex align-items-center text-center py-0 px-4 px-lg-5">
            <h1 class="m-0 text-primary">ProLink</h1>
        </a>
        <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto p-4 p-lg-0">
                <a th:href="@{/}" class="nav-item nav-link">Accueil</a>
                <a th:href="@{/offres}" class="nav-item nav-link">Offres</a>
                <a th:href="@{/profil/dashboard}" class="nav-item nav-link">Dashboard</a>
                <a th:href="@{/profil/mon-profil}" class="nav-item nav-link">Mon profil</a>
                <a th:href="@{/profil/notifications}" class="nav-item nav-link position-relative">
                    <i class="fa fa-bell"></i>
                    <span th:if="${notifNonLues > 0}"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          style="font-size:0.6rem;"
                          th:text="${notifNonLues}">0</span>Notifications
                </a>
                <form th:action="@{/auth/deconnexion}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-link nav-link text-danger p-0">
                        <i class="fa fa-sign-out-alt me-1"></i>Déconnexion
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="container-xxl py-5 bg-dark page-header mb-5">
        <div class="container my-5 pt-5 pb-4">
            <h1 class="display-3 text-white mb-3 animated slideInDown">Mes documents</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb text-uppercase">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-white">Accueil</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/profil/dashboard}" class="text-white">Dashboard</a></li>
                    <li class="breadcrumb-item text-white active" aria-current="page">Mes documents</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="container-xxl py-5">
        <div class="container">
            <div th:if="${succes}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fa fa-check-circle me-2"></i><span th:text="${succes}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${erreur}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fa fa-exclamation-circle me-2"></i><span th:text="${erreur}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">
                <!-- Upload -->
                <div class="col-lg-5 wow fadeInUp" data-wow-delay="0.1s">
                    <div class="card border-0 shadow h-100">
                        <div class="card-header bg-white py-3">
                            <h5 class="mb-0"><i class="fa fa-upload text-primary me-2"></i>Déposer un document</h5>
                        </div>
                        <div class="card-body p-4">
                            <form th:action="@{/profil/documents/upload}" method="post" enctype="multipart/form-data">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Type de document</label>
                                    <select name="type" class="form-select py-2" required>
                                        <option value="">-- Sélectionner --</option>
                                        <option th:each="t : ${typesDocument}" th:value="${t.name()}" th:text="${t.name()}"></option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Fichier (PDF, JPG, PNG max 5 Mo)</label>
                                    <input type="file" name="fichier" class="form-control py-2" accept=".pdf,.jpg,.jpeg,.png" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2">
                                    <i class="fa fa-upload me-2"></i>Déposer
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Liste -->
                <div class="col-lg-7 wow fadeInUp" data-wow-delay="0.2s">
                    <div class="card border-0 shadow h-100">
                        <div class="card-header bg-white py-3">
                            <h5 class="mb-0"><i class="fa fa-file-alt text-primary me-2"></i>Mes documents</h5>
                        </div>
                        <div class="card-body p-0">
                            <div th:if="${#lists.isEmpty(documents)}" class="text-center py-5">
                                <i class="fa fa-file fa-3x text-muted mb-3"></i>
                                <p class="text-muted">Aucun document déposé pour l'instant.</p>
                            </div>
                            <div th:if="${!#lists.isEmpty(documents)}" class="list-group list-group-flush">
                                <div th:each="doc : ${documents}" class="list-group-item px-4 py-3">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <i class="fa fa-file-pdf text-danger me-2" th:if="${doc.typeMime != null and doc.typeMime.contains('pdf')}"></i>
                                            <i class="fa fa-file-image text-primary me-2" th:if="${doc.typeMime != null and doc.typeMime.contains('image')}"></i>
                                            <i class="fa fa-file text-secondary me-2" th:if="${doc.typeMime == null}"></i>
                                            <strong th:text="${doc.nomFichier}">fichier.pdf</strong>
                                            <div class="small text-muted">
                                                <span th:text="${doc.typeDocument}"></span> &middot;
                                                <span th:text="${#temporals.format(doc.dateDepot, 'dd/MM/yyyy HH:mm')}"></span>
                                            </div>
                                        </div>
                                        <div class="text-end">
                                            <span th:switch="${doc.statutValidation.name()}">
                                                <span th:case="'EN_ATTENTE'" class="badge bg-warning text-dark d-block mb-1">En attente</span>
                                                <span th:case="'VALIDE'" class="badge bg-success d-block mb-1">Validé</span>
                                                <span th:case="'REJETE'" class="badge bg-danger d-block mb-1">Rejeté</span>
                                            </span>
                                            <form th:action="@{/profil/documents/supprimer/{id}(id=${doc.id})}" method="post"
                                                  th:if="${doc.statutValidation.name() != 'VALIDE'}"
                                                  onsubmit="return confirm('Supprimer ce document ?')">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                                    <i class="fa fa-trash me-1"></i>Supprimer
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark text-white-50 footer pt-5 mt-5">
        <div class="container py-5 text-center">
            &copy; <a class="border-bottom text-white-50" th:href="@{/}">ProLink</a>, Tous droits réservés.
        </div>
    </div>
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/lib/wow/wow.min.js}"></script>
<script th:src="@{/lib/easing/easing.min.js}"></script>
<script th:src="@{/lib/waypoints/waypoints.min.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
