<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Offres en attente - Admin ProLink</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/lib/animate/animate.min.css}" rel="stylesheet">
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container-xxl bg-white p-0">

  <!-- Spinner -->
  <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="sr-only">Chargement...</span>
    </div>
  </div>

  <!-- Navbar Admin -->
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow sticky-top p-0">
    <a th:href="@{/admin/dashboard}" class="navbar-brand d-flex align-items-center text-center py-0 px-4 px-lg-5">
      <h1 class="m-0 text-primary">ProLink <span class="text-white fs-6 fw-normal ms-2">Admin</span></h1>
    </a>
    <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse">
      <div class="navbar-nav ms-auto p-4 p-lg-0">
        <a th:href="@{/admin/dashboard}" class="nav-item nav-link text-white-50"><i class="fa fa-tachometer-alt me-1"></i>Dashboard</a>
        <a th:href="@{/admin/users}" class="nav-item nav-link text-white-50"><i class="fa fa-users me-1"></i>Utilisateurs</a>
        <a th:href="@{/admin/documents}" class="nav-item nav-link text-white-50"><i class="fa fa-file me-1"></i>Documents</a>
        <a th:href="@{/admin/offres/pending}" class="nav-item nav-link active text-white"><i class="fa fa-briefcase me-1"></i>Offres</a>
        <form th:action="@{/auth/deconnexion}" method="post" class="d-inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="nav-item nav-link text-danger border-0 bg-transparent"><i class="fa fa-sign-out-alt me-1"></i>Déconnexion</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <div class="container-xxl py-5 bg-dark page-header mb-5">
    <div class="container my-5 pt-5 pb-4">
      <h1 class="display-3 text-white mb-3 animated slideInDown">Offres en attente</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}" class="text-white">Dashboard</a></li>
          <li class="breadcrumb-item text-white active">Offres à valider</li>
        </ol>
      </nav>
    </div>
  </div>

  <div class="container-xxl py-5">
    <div class="container">

      <!-- Messages flash -->
      <div class="alert alert-success alert-dismissible fade show" th:if="${succes}" role="alert">
        <i class="fa fa-check-circle me-2"></i><span th:text="${succes}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div class="alert alert-danger alert-dismissible fade show" th:if="${erreur}" role="alert">
        <i class="fa fa-exclamation-circle me-2"></i><span th:text="${erreur}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Aucune offre -->
      <div th:if="${#lists.isEmpty(offres)}" class="text-center py-5">
        <i class="fa fa-check-circle fa-4x text-success mb-4"></i>
        <h4 class="text-muted">Aucune offre en attente de validation</h4>
      </div>

      <!-- Liste offres -->
      <div th:each="offre : ${offres}" class="card border-0 shadow mb-4 wow fadeInUp" data-wow-delay="0.1s">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
          <h5 class="mb-0" th:text="${offre.titre}"></h5>
          <span class="badge bg-warning text-dark">En attente</span>
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-8">
              <div class="d-flex flex-wrap gap-3 mb-3 text-muted small">

                <!-- Entreprise : champ direct ou nom du recruteur -->
                <span th:if="${offre.entreprise != null and !#strings.isEmpty(offre.entreprise)}">
                  <i class="fa fa-building me-1"></i>
                  <span th:text="${offre.entreprise}"></span>
                </span>
                <span th:if="${(offre.entreprise == null or #strings.isEmpty(offre.entreprise)) and offre.recruteur != null}">
                  <i class="fa fa-building me-1"></i>
                  <span th:text="${offre.recruteur.nomComplet}"></span>
                </span>

                <span th:if="${offre.lieu != null}">
                  <i class="fa fa-map-marker-alt me-1"></i>
                  <span th:text="${offre.lieu}"></span>
                </span>
                <span th:if="${offre.typeContrat != null}">
                  <i class="far fa-clock me-1"></i>
                  <span th:text="${offre.typeContrat}"></span>
                </span>
                <span th:if="${offre.remuneration != null}">
                  <i class="far fa-money-bill-alt me-1"></i>
                  <span th:text="${offre.remuneration}"></span>
                </span>

                <!-- Date publication protégée contre le null -->
                <span>
                  <i class="fa fa-calendar me-1"></i>
                  <span th:text="${offre.datePublication != null ? #temporals.format(offre.datePublication, 'dd/MM/yyyy') : 'N/A'}"></span>
                </span>

              </div>
              <p class="text-muted mb-2" th:text="${#strings.abbreviate(offre.description, 300)}"></p>
              <div th:if="${offre.competencesRequises != null}" class="mt-2">
                <small class="fw-bold text-dark">Compétences requises : </small>
                <small class="text-muted" th:text="${offre.competencesRequises}"></small>
              </div>
            </div>
            <div class="col-md-4 d-flex flex-column gap-2">
              <!-- Approuver -->
              <form th:action="@{/admin/offres/approuver}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="id" th:value="${offre.id}"/>
                <button type="submit" class="btn btn-success w-100">
                  <i class="fa fa-check me-2"></i>Approuver et publier
                </button>
              </form>
              <!-- Rejeter avec motif -->
              <form th:action="@{/admin/offres/rejeter}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="id" th:value="${offre.id}"/>
                <div class="input-group">
                  <input type="text" name="motif" class="form-control form-control-sm"
                         placeholder="Motif du rejet...">
                  <button type="submit" class="btn btn-danger btn-sm"
                          onclick="return confirm('Rejeter cette offre ?')">
                    <i class="fa fa-times"></i>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div class="container-fluid bg-dark text-white-50 footer pt-5 mt-5">
    <div class="container py-5 text-center">
      &copy; <a class="border-bottom text-white-50" th:href="@{/}">ProLink</a> Admin — Tous droits réservés.
    </div>
  </div>

  <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/lib/wow/wow.min.js}"></script>
<script th:src="@{/lib/easing/easing.min.js}"></script>
<script th:src="@{/lib/waypoints/waypoints.min.js}"></script>
<script th:src="@{/js/main.js}"></script>
<!-- Sécurité : cache le spinner même si WOW plante -->
<script>
  setTimeout(function() {
    var s = document.getElementById('spinner');
    if (s) s.classList.remove('show');
  }, 500);
</script>
</body>
</html>
